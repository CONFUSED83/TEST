<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=2.0">
    <meta name="referrer" content="no-referrer">
    <title>Premium Inventory - Scraped from Sheets</title>
    <!-- Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050608;
            --surface: #101217;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(16, 18, 23, 0.85);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Hero */
        header {
            padding: 60px 20px 40px;
            text-align: center;
            background: radial-gradient(circle at top, rgba(34, 197, 94, 0.08), transparent 70%);
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            line-height: 1;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Nav / Controls */
        .controls {
            margin-bottom: 48px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .sort-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .sort-select:focus {
            border-color: var(--accent);
        }

        .search {
            flex: 1;
            min-width: 260px;
            position: relative;
        }

        .search i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            padding: 14px 20px 14px 54px;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .search input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .btn-filter {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .btn-filter:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-filter.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        /* Premium Masonry Layout */
        #productGrid {
            column-count: 3;
            column-gap: 32px;
            width: 100%;
        }

        @media (max-width: 1200px) {
            #productGrid {
                column-count: 2;
                column-gap: 24px;
            }
        }

        @media (max-width: 768px) {
            #productGrid {
                column-count: 2;
                column-gap: 12px;
            }

            .container {
                padding: 0 12px;
            }

            .controls {
                flex-direction: column;
                gap: 12px;
            }

            .search {
                width: 100%;
                order: -1;
            }

            .filters {
                width: 100%;
            }

            .sort-select {
                width: 100%;
            }

            .body {
                padding: 14px !important;
            }

            .title {
                font-size: clamp(1rem, 4.5vw, 1.25rem) !important;
                margin-bottom: 8px !important;
            }

            .price-val {
                font-size: 1.4rem !important;
            }

            .price-box {
                margin-bottom: 12px !important;
            }

            .info-grid {
                padding: 10px !important;
                margin-bottom: 16px !important;
            }

            .badge {
                top: 8px !important;
                right: 8px !important;
                padding: 4px 8px !important;
                font-size: 9px !important;
            }

            /* Vertical Info Rows for Mobile */
            .info-row {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 2px !important;
                padding: 6px 0;
            }

            .info-row .label {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.6;
            }

            .info-row .val {
                font-size: 13px;
            }
        }

        /* Lightbox System */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox.active img {
            transform: scale(1);
        }

        /* Detail Toggle */
        .details-extra {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            opacity: 0;
        }

        .card.expanded .details-extra {
            max-height: 500px;
            opacity: 1;
            margin-top: 10px;
        }

        .expand-hint {
            text-align: center;
            font-size: 12px;
            color: var(--accent);
            margin-top: 10px;
            font-weight: 700;
            opacity: 0.7;
        }

        .card.expanded .expand-hint {
            display: none;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 32px;
            break-inside: avoid;
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67), box-shadow 0.4s;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.6);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .img-container {
            background: #080a0c;
            position: relative;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.8s ease;
        }

        .card:hover .img-container img {
            transform: scale(1.08);
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .body {
            padding: 28px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .cat {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .price-box {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 24px;
        }

        .price-val {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
        }

        .price-curr {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }

        .info-grid {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            display: grid;
            gap: 8px;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .label {
            color: var(--text-muted);
        }

        .val {
            color: white;
            font-weight: 600;
        }

        .notes {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 30px;
            /* Increased gap before button */
            padding-left: 10px;
            border-left: 2px solid var(--accent);
        }

        .btn-wa span.pc-text {
            display: inline;
        }

        .btn-wa span.mob-text {
            display: none;
        }

        @media (max-width: 600px) {
            .btn-wa span.pc-text {
                display: none;
            }

            .btn-wa span.mob-text {
                display: inline;
            }

            .expand-hint {
                margin-bottom: 20px;
            }
        }

        .btn-wa {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            margin-top: auto;
            transition: 0.3s;
        }

        .btn-wa:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }

        /* States */
        #statusDisplay {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
        }

        .loading-ring {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .debug-panel {
            display: none;
            background: #1a1a1a;
            color: #4ade80;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            border-left: 4px solid #4ade80;
        }
    </style>
</head>

        <h1>The Catalog</h1>
    </header>

        <div id="debug" class="debug-panel"></div>

        <div class="controls">

                <input type="text" id="searchInput" placeholder="Search furniture, electronics, books...">
            </div>
            <div class="filters" id="categoryFilters">
                <button class="btn-filter active" onclick="filterCat('all')">All Items</button>
            </div>
            <select id="priceSort" class="sort-select" onchange="render()">
                <option value="default">Default Sort</option>
                <option value="low">Price: Low to High</option>
                <option value="high">Price: High to Low</option>
            </select>
        </div>

        <div id="productGrid">
            <div id="statusDisplay">
                <div class="loading-ring"></div>
                <p>Gathering inventory from Google Sheets...</p>
            </div>
        </div>
    </div>

            "Wooden Vase": "https://docs.google.com/sheets-images-rt/AEjM2AxRb-y_4lw3RfQtXFvxcQl868K4o0sewbwufAe0Hs0WiU-37sRg3RjGEbGy7YgJwg2svZpVso0LG0mkg9MA8gkeIwMrRf6t1ckNBQEDTXdFkGpYD-rk5Y0nSQlTQoj6xixkCZAx2UoADCS8DPAcpovP0ol219UQ3m2L4w=w399-h220",
            "Yasir Qadhi - Lessons from Surah Al Kahf": "https://docs.google.com/sheets-images-rt/AEjM2AwTQMk8sv_YY179X_XDpjQVpIMD77KW9T7y_gp185FDLhOJD8XZixJmHnRi0ZnHlVArdZTaQVHpzGrFqbZCPOq8oh0EMCsO2OpPnG5kZRcVSX5WWpuRg-w4MVzOa77wrW_nVowWFCytMZEFm7WY-Cuk2vlg4jCqynEF-w=w399-h221",
            "Yasir Qadhi - Lessons from Sural Yusuf": "https://docs.google.com/sheets-images-rt/AEjM2AxHj5jw-SBwYjyg14v-EIS1acMaEKdWxQLq80UkdhhuS5CFMh-HbwkiM1NovCSc8oVfE02wqTg74QpPKMk5XYGRMIAsAJhMqx80XvYSmEYOfy868b08bvRb1HLLsMnKAv-mmuuLvnrMjGJssvp6O5wxcG2Xb-y-SW0=w399-h221"
        };

        let db = [];
        let currentFilter = 'all';
        let searchQuery = '';

        const ERROR_IMAGE = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==";

        const log = (msg) => {
            console.log(`> ${msg}`);
            // UI logging disabled for clean look
        };

        function revealCard(idx) {
            const card = document.getElementById(`card-${idx}`);
            if (card) {
                // Stagger the reveal slightly
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, idx * 50);
            }
        }

        function handleBrokenImg(img, idx) {
            console.warn(`Systematic load failed for item ${idx}. Using fallback.`);
            img.src = ERROR_IMAGE;
            revealCard(idx);
        }

        /**
         * INITIALIZATION
         */
        function init() {
            // Construct GViz URL with proper callback parameter
            // 'responseHandler' is the parameter Google uses to define the function name in the JSONP response
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:handleResponse&tq=`;

            const script = document.createElement('script');
            script.src = url;
            script.onerror = () => {
                log('Script load failed. This might be a network or CORS issue.');
                showError('Could not load Google Sheets script.');
            };
            document.body.appendChild(script);

            // Security timeout
            setTimeout(() => {
                if (db.length === 0) {
                    log('Timeout: No response from Google Sheets after 8 seconds.');
                    showError('Connect timed out. Please check sharing permissions (Anyone with link).');
                }
            }, 8000);
        }

        /**
         * GOOGLE RESPONSE HANDLER
         */
        window.handleResponse = function (resp) {
            log('Response received from Google Sheets.');
            try {
                const table = resp.table;
                const rows = table.rows;

                // Map the rows dynamically
                db = rows.map((row, index) => {
                    const c = row.c;
                    // Index-based mapping according to your sheet structure
                    // 0: Avail/Sold, 1: Cat, 2: Name, 3: Cond, 4: Price, 5: Negot, 6: AvailNow, 7: Notes, 8: Photo
                    return {
                        id: index,
                        status: c[0] ? c[0].v : '',
                        category: c[1] ? c[1].v : 'Other',
                        name: c[2] ? c[2].v : '',
                        condition: c[3] ? c[3].v : 'Good',
                        price: c[4] ? (c[4].f || c[4].v) : 'Contact',
                        negotiable: c[5] ? c[5].v : 'No',
                        availNow: c[6] ? c[6].v : 'Yes',
                        notes: c[7] ? c[7].v : '',
                        photo: c[8] ? c[8].v : null
                    };
                }).filter(item => item.name); // Filter out empty-named rows

                log(`Parsed ${db.length} items successfully.`);
                renderFilters();
                render();
            } catch (err) {
                log(`Error parsing JSON: ${err.message}`);
                showError('Failed to parse sheet data structure.');
            }
        };

        /**
         * UI RENDERING
         */
        function renderFilters() {
            const cats = ['all', ...new Set(db.map(i => i.category))];
            const container = document.getElementById('categoryFilters');
            container.innerHTML = cats.map(cat => `
            <button class="btn-filter ${currentFilter === cat ? 'active' : ''}" onclick="filterCat('${cat}')">
                ${cat.charAt(0).toUpperCase() + cat.slice(1)}
            </button>
        `).join('');
        }

        function filterCat(cat) {
            currentFilter = cat;
            renderFilters();
            render();

            // Snap centered logic
            const activeBtn = document.querySelector('.btn-filter.active');
            if (activeBtn) {
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = url;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function toggleCard(idx) {
            const card = document.getElementById(`card-${idx}`);
            const alreadyExpanded = card.classList.contains('expanded');

            // Close all other cards
            document.querySelectorAll('.card.expanded').forEach(c => {
                c.classList.remove('expanded');
            });

            // Toggle current if it wasn't the one we just closed
            if (!alreadyExpanded) {
                card.classList.add('expanded');
            }
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const sortVal = document.getElementById('priceSort').value;

            let items = db.filter(i => {
                const matchSearch = i.name.toLowerCase().includes(searchQuery) ||
                    i.notes.toLowerCase().includes(searchQuery) ||
                    i.category.toLowerCase().includes(searchQuery);
                const matchCat = currentFilter === 'all' || i.category === currentFilter;
                return matchSearch && matchCat;
            });

            // Sorting Logic
            if (sortVal !== 'default') {
                items.sort((a, b) => {
                    const priceA = parseFloat(a.price.replace(/[^0-9.-]+/g, ""));
                    const priceB = parseFloat(b.price.replace(/[^0-9.-]+/g, ""));
                    return sortVal === 'low' ? priceA - priceB : priceB - priceA;
                });
            }

            if (items.length === 0) {
                grid.innerHTML = `<div id="statusDisplay"><h3>No results found</h3></div>`;
                return;
            }

            grid.innerHTML = items.map((i, idx) => {
                const waMsg = encodeURIComponent(
                    `Hi, I am interested in\n${i.name}\n\nPrice: Rs. ${i.price}`
                );

                // Image Loading Strategy:
                // We show an <img> with referrerpolicy="no-referrer" 
                // and use opacity:0 (handled by .card.hidden) until it's ready.

                let photoUrl = IMAGE_MAP[i.name] || i.photo;
                if (!photoUrl || !photoUrl.includes('http')) {
                    const match = i.notes.match(/https?:\/\/[^\s]+/);
                    if (match && match[0].match(/\.(jpg|jpeg|png|webp)/i)) {
                        photoUrl = match[0];
                    } else {
                        photoUrl = ERROR_IMAGE;
                    }
                }

                // If it's a Google Sheet internal image, use proxy to bypass hotlink protection
                if (photoUrl.includes('sheets-images-rt')) {
                    // Remove size constraints from the original Google URL to get high quality
                    // (e.g., replace =w399-h220 with =s2048)
                    const highQualityUrl = photoUrl.replace(/=[wsh]\d+-[wsh]\d+.*$/, '=s2048');
                    photoUrl = `https://images.weserv.nl/?url=${encodeURIComponent(highQualityUrl)}&output=webp&q=90`;
                }

                return `
                <div class="card" id="card-${idx}" style="opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);" onclick="toggleCard(${idx})">
                    <div class="img-container" onclick="event.stopPropagation(); openLightbox('${photoUrl}')">
                        ${i.status ? `<div class="badge">${i.status}</div>` : ''}
                        <img id="img-${idx}" 
                             src="${photoUrl}" 
                             alt="${i.name}" 
                             onload="revealCard(${idx})"
                             onerror="handleBrokenImg(this, ${idx})">
                    </div>
                    <div class="body">
                        <div class="cat">${i.category}</div>
                        <h2 class="title">${i.name}</h2>
                        <div class="price-box">
                            <span class="price-curr">Rs.</span>
                            <span class="price-val">${i.price}</span>
                        </div>
                        
                        <div class="details-extra">
                            <div class="info-grid">
                                <div class="info-row">
                                    <span class="label">Condition</span>
                                    <span class="val">${i.condition}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Negotiable</span>
                                    <span class="val">${i.negotiable}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Available</span>
                                    <span class="val">${i.availNow}</span>
                                </div>
                            </div>
                            ${i.notes ? `<div class="notes">${i.notes.replace(/\n/g, '<br>')}</div>` : ''}
                        </div>

                        <div class="expand-hint">Tap for details <i class="fa fa-chevron-down"></i></div>

                        <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" class="btn-wa" onclick="event.stopPropagation()">
                            <i class="fab fa-whatsapp"></i> 
                            <span class="pc-text">Buy via WhatsApp</span>
                            <span class="mob-text">Buy</span>
                        </a>
                    </div>
                </div>
            `;
            }).join('');
        }

        function showError(msg) {
            document.getElementById('productGrid').innerHTML = `
            <div id="statusDisplay" style="border: 2px dashed rgba(255,100,100,0.3); padding: 40px; border-radius: 20px;">
                <i class="fa fa-plug" style="font-size: 32px; color: #f87171; margin-bottom: 20px;"></i>
                <h3>Sync Error</h3>
                <p style="color: #f87171; margin: 10px 0;">${msg}</p>
                <p style="font-size: 14px; opacity: 0.7;">Make sure your Sheet is Shared to "Anyone with the link".</p>
                <button onclick="location.reload()" class="btn-filter active" style="margin-top:20px;">Retry Now</button>
            </div>
        `;
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            render();
        });

        init();
    </script>
