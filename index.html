<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Catalog - Live Inventory</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #08090b;
            --card: #13151a;
            --accent: #00d95a;
            --accent-glow: rgba(0, 217, 90, 0.3);
            --text: #c9ced6;
            --text-bright: #ffffff;
            --muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --price: #4ade80;
            --glass: rgba(19, 21, 26, 0.7);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 217, 90, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 217, 90, 0.03) 0%, transparent 40%);
            min-height: 100vh;
        }

        /* Hero Header */
        header {
            padding: 100px 20px 60px;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-bright);
            margin-bottom: 16px;
            animation: slideDown 0.8s var(--ease);
        }

        header p {
            color: var(--muted);
            font-size: clamp(16px, 2vw, 20px);
            max-width: 700px;
            margin: 0 auto;
            animation: fadeIn 1.2s var(--ease);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        /* Premium Nav / Filter Bar */
        .nav-bar {
            position: sticky;
            top: 24px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 60px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.8s var(--ease);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .search-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            padding: 14px 14px 14px 50px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .cat-btn:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .cat-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Grid & Cards */
        #mainGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.4s var(--ease);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: cardReveal 0.6s var(--ease) backwards;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .card-img {
            aspect-ratio: 4/3;
            background: #0d0f12;
            overflow: hidden;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s var(--ease);
        }

        .card:hover .card-img img {
            transform: scale(1.1);
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .status-available {
            background: rgba(0, 217, 90, 0.2);
            color: #4ade80;
            border: 1px solid rgba(0, 217, 90, 0.3);
        }

        .status-sold {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .card-content {
            padding: 28px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            margin-bottom: 12px;
            font-family: 'Outfit', sans-serif;
        }

        .card-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--price);
            margin-bottom: 20px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .card-price small {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        .card-specs {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
        }

        .spec {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .spec-label {
            color: var(--muted);
        }

        .spec-value {
            color: white;
            font-weight: 600;
        }

        .card-notes {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 24px;
            line-height: 1.5;
            border-left: 2px solid var(--accent);
            padding-left: 12px;
        }

        .buy-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 800;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: auto;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        /* Empty States / Loading */
        #loader {
            grid-column: 1/-1;
            text-align: center;
            padding: 100px 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            grid-column: 1/-1;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
        }

        .error-message h3 {
            color: #f87171;
            margin-bottom: 12px;
        }

        .error-message code {
            display: block;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid var(--border);
            color: var(--muted);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header {
                padding: 60px 20px 40px;
            }

            .nav-bar {
                top: 12px;
            }

            #mainGrid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Premium Inventory</h1>
        <p>Connecting you with high-quality electronics, unique furniture, and curated collectibles in Pakistan.</p>
    </header>

    <div class="container">
        <div class="nav-bar">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search items by name, category, or notes...">
            </div>
            <div class="categories" id="catList">
                <button class="cat-btn active" onclick="setCategory('all')">All Items</button>
            </div>
        </div>

        <div id="mainGrid">
            <div id="loader">
                <div class="spinner"></div>
                <p>Syncing with Google Sheets...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Premium Catalog • Worldwide Shipping available on select items.</p>
        <p style="margin-top: 10px;">WhatsApp: +92 305 7374485</p>
    </footer>

    <script>
        const SHEET_ID = '1uVEKMcghO2k76-3O1b8QDDVec7qYEpfUZtn0so0TWa4';
        const WA_PHONE = '923057374485';

        let allItems = [];
        let currentCategory = 'all';
        let searchTerm = '';

        /**
         * Data Fetching Engine
         * Uses JSONP to bypass CORS issues when running from local file://
         */
        function init() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=&callback=handleResponse`;
            const script = document.createElement('script');
            script.src = url;
            script.id = 'gData';
            document.body.appendChild(script);

            // Timeout check: if no data after 10s, show troubleshooting
            setTimeout(() => {
                if (allItems.length === 0) {
                    renderError();
                }
            }, 10000);
        }

        // Google visualization callback
        window.handleResponse = function (response) {
            try {
                const rows = response.table.rows;
                const cols = response.table.cols;

                // Map table indices to our data structure
                // Available/Sold=0, Category=1, ItemName=2, Condition=3, Price=4, Negot=5, AvailNow=6, Notes=7, Photo=8
                allItems = rows.map(r => {
                    const vals = r.c;
                    return {
                        status: (vals[0]?.v || '').toString(),
                        category: (vals[1]?.v || 'General').toString(),
                        name: (vals[2]?.v || 'Unknown Item').toString(),
                        condition: (vals[3]?.v || 'N/A').toString(),
                        price: (vals[4]?.v || 'Contact').toString(),
                        negotiable: (vals[5]?.v || 'No').toString(),
                        availability: (vals[6]?.v || 'Yes').toString(),
                        notes: (vals[7]?.v || '').toString(),
                        photo: (vals[8]?.v || '').toString()
                    };
                }).filter(item => item.name !== 'Unknown Item');

                renderCategories();
                render();
            } catch (e) {
                console.error(e);
                renderError();
            }
        };

        function renderCategories() {
            const cats = ['all', ...new Set(allItems.map(i => i.category))];
            const container = document.getElementById('catList');
            container.innerHTML = cats.map(c => `
            <button class="cat-btn ${currentCategory === c ? 'active' : ''}" 
                    onclick="setCategory('${c}')">
                ${c.charAt(0).toUpperCase() + c.slice(1)}
            </button>
        `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');

            const filtered = allItems.filter(i => {
                const matchCat = currentCategory === 'all' || i.category === currentCategory;
                const matchSearch = i.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    i.notes.toLowerCase().includes(searchTerm.toLowerCase());
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div id="loader"><p>No items found match your criteria.</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map((item, idx) => {
                const isSold = item.status.toLowerCase().includes('sold');
                const waMsg = encodeURIComponent(
                    `Hi! I'm interested in: *${item.name}*\nPrice: Rs. ${item.price}\nCondition: ${item.condition}\nSource: Premium Web Catalog`
                );

                // Image Logic
                let imgSrc = item.photo;
                if (!imgSrc || !imgSrc.includes('http')) {
                    // Check if notes contain a URL
                    const urlMatch = item.notes.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) imgSrc = urlMatch[0];
                    else imgSrc = `https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400&auto=format&fit=crop`; // Generic fallback
                }

                return `
            <div class="card" style="animation-delay: ${idx * 0.05}s">
                <div class="card-img">
                    <div class="status-badge ${isSold ? 'status-sold' : 'status-available'}">
                        ${item.status || 'Available'}
                    </div>
                    <img src="${imgSrc}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1594489428504-5c0c480a15fd?q=80&w=400&h=300&auto=format&fit=crop'">
                </div>
                <div class="card-content">
                    <div class="card-tag">${item.category}</div>
                    <h2 class="card-title">${item.name}</h2>
                    <div class="card-price"><small>Rs.</small> ${item.price}</div>
                    
                    <div class="card-specs">
                        <div class="spec">
                            <span class="spec-label">Condition</span>
                            <span class="spec-value">${item.condition}</span>
                        </div>
                        <div class="spec">
                            <span class="spec-label">Negotiable</span>
                            <span class="spec-value">${item.negotiable}</span>
                        </div>
                    </div>

                    ${item.notes ? `<div class="card-notes">${item.notes.replace(/\n/g, '<br>')}</div>` : ''}

                    <a href="https://wa.me/${WA_PHONE}?text=${waMsg}" target="_blank" class="buy-btn">
                        <i class="fab fa-whatsapp"></i> Buy via WhatsApp
                    </a>
                </div>
            </div>
            `;
            }).join('');
        }

        function renderError() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = `
            <div class="error-message">
                <h3><i class="fa fa-exclamation-triangle"></i> Inventory Sync Offline</h3>
                <p>Ensure your Google Sheet is set to <b>"Anyone with the link can view"</b>.</p>
                <div style="text-align: left; max-width: 500px; margin: 20px auto;">
                    <p><b>Quick Fix:</b></p>
                    <ol style="margin-left: 20px; font-size: 14px;">
                        <li>Open your Google Sheet.</li>
                        <li>Click <b>Share</b> (top right).</li>
                        <li>Change General Access to <b>"Anyone with the link"</b>.</li>
                        <li>Refresh this page.</li>
                    </ol>
                </div>
                <button class="cat-btn active" onclick="location.reload()">Retry Connection</button>
            </div>
        `;
        }

        // Search Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            render();
        });

        // Fire it up
        init();
    </script>

</body>

</html>
